{% raw %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nivolumab Patient Enrolment — TatvaCare</title>
  <style>
    :root {
      --bg: #f4f6f8; --card: #ffffff; --ink: #1a2533; --muted: #5b6b7c;
      --line: #d9e0e7; --brand: #0a7d6b; --brand-ink: #ffffff; --err: #c0392b; --ok: #0a7d6b;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 24px 16px 64px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 28px; }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .sub { color: var(--muted); margin: 0 0 24px; font-size: 14px; }
    label { display: block; font-weight: 600; font-size: 13px; margin: 16px 0 6px; }
    label .req { color: var(--err); }
    input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--line);
      border-radius: 8px; font: inherit; color: var(--ink); background: #fff; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--brand); }
    .phone { display: flex; }
    .phone .cc { flex: 0 0 56px; border-right: 0; border-radius: 8px 0 0 8px; background: #eef2f5;
      text-align: center; color: var(--muted); }
    .phone input { border-radius: 0 8px 8px 0; }
    textarea { min-height: 80px; resize: vertical; }
    button { margin-top: 24px; width: 100%; padding: 12px; border: 0; border-radius: 8px;
      background: var(--brand); color: var(--brand-ink); font-size: 15px; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .6; cursor: default; }
    .msg { margin-top: 18px; padding: 12px 14px; border-radius: 8px; font-size: 14px; display: none; }
    .msg.err { display: block; background: #fdecea; color: var(--err); }
    .msg.ok { display: block; background: #e7f5f1; color: var(--ok); }
    .hint { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .foot { text-align: center; color: var(--muted); font-size: 12px; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Nivolumab Patient Enrolment</h1>
      <p class="sub">TatvaCare patient support — please enter the patient's details below.</p>

      <form id="enrol">
        <label>Patient Name <span class="req">*</span></label>
        <input name="patient_name" maxlength="100" required />

        <label>Patient Phone Number <span class="req">*</span></label>
        <div class="phone">
          <span class="cc">+91</span>
          <input name="phone" type="tel" inputmode="numeric" pattern="[0-9]{10}" maxlength="10"
                 placeholder="10-digit mobile" required />
        </div>

        <label>Doctor Name <span class="req">*</span></label>
        <input name="doctor_name" maxlength="50" required />

        <label>Hospital Name <span class="req">*</span></label>
        <input name="hospital_name" maxlength="50" required />

        <label>City <span class="req">*</span></label>
        <input name="city" maxlength="50" required />

        <label>Nivolumab Dosage <span class="req">*</span></label>
        <input name="nivolumab_dosage" maxlength="256" required />

        <label>Nivolumab Indication <span class="req">*</span></label>
        <select name="nivolumab_indication" required>
          <option value="" disabled selected>Select indication</option>
          <option>NSCLC</option><option>GI</option><option>RCC</option><option>SCCHN</option>
          <option>Urothelial Carcinoma</option><option>Melanoma</option><option>CHL</option>
          <option>mCRC</option><option>Gynecology cancer</option><option>Breast Cancer</option>
          <option>Sarcoma</option><option>HCC</option><option>Neuroendocrine Cancer</option><option>Others</option>
        </select>

        <label>Remarks <span class="req">*</span></label>
        <textarea name="remarks" maxlength="256" required></textarea>

        <label>Upload Prescription</label>
        <input name="prescription" type="file" accept=".pdf,.png,.jpg,.jpeg" />
        <div class="hint">Optional. PDF or image, up to 5 MB.</div>

        <button type="submit" id="btn">Submit Enrolment</button>
        <div class="msg" id="msg"></div>
      </form>
    </div>
    <p class="foot">Powered by TatvaCare</p>
  </div>

  <script>
    const CSRF = "{% endraw %}{{ csrf_token }}{% raw %}";
    const ENDPOINT = "/api/method/tatva_connect.api.enrolment.nivolumab_enrolment";
    const form = document.getElementById("enrol");
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.className = "msg"; msg.textContent = "";
      const file = form.prescription.files[0];
      if (file && file.size > 5 * 1024 * 1024) {
        msg.className = "msg err"; msg.textContent = "Prescription file must be under 5 MB."; return;
      }
      btn.disabled = true; btn.textContent = "Submitting…";
      try {
        const fd = new FormData(form);
        const res = await fetch(ENDPOINT, {
          method: "POST",
          headers: CSRF ? { "X-Frappe-CSRF-Token": CSRF } : {},
          body: fd,
        });
        const data = await res.json().catch(() => ({}));
        const m = data.message || {};
        if (res.ok && m.ok) {
          form.reset();
          msg.className = "msg ok";
          msg.textContent = "Thank you — the patient has been enrolled successfully.";
        } else {
          const err = (data._server_messages && JSON.parse(data._server_messages)[0]) || data.exception || "Submission failed. Please check the details and try again.";
          msg.className = "msg err";
          msg.textContent = (typeof err === "string" ? err.replace(/<[^>]+>/g, "") : "Submission failed.");
        }
      } catch (_) {
        msg.className = "msg err"; msg.textContent = "Network error. Please try again.";
      } finally {
        btn.disabled = false; btn.textContent = "Submit Enrolment";
      }
    });
  </script>
</body>
</html>{% endraw %}
